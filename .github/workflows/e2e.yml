# Hermetic end-to-end: run the FULL pipeline (branch/fetch/manifest/diff/emerge/
# elog-gate/smoke/commit) against real portage in a gentoo container, on a
# throwaway fixture package. This is the reproducible proof that stages 6-7 work
# -- the gate the decision CI (ci.yml) cannot cover because it never emerges.
name: e2e

on:
  push:
    paths: ['lib/**', 'bin/**', 'test/e2e.sh', 'test/fixtures/demo-e2e/**', '.github/workflows/e2e.yml']
  pull_request:
  workflow_dispatch:

jobs:
  hermetic-e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    container:
      image: gentoo/stage3:amd64-openrc
      options: --privileged

    steps:
    - name: sync gentoo tree
      run: emerge-webrsync

    - name: setup portage (binpkgs keep tool install fast)
      run: |
        # expand $(nproc) HERE, not in make.conf: a literal $(...) there trips
        # portage's config parser ("$: bad substitution") and breaks the whole config.
        # FEATURES keeps its ${FEATURES} so portage appends to the stage3 defaults.
        {
          echo 'FEATURES="${FEATURES} getbinpkg"'
          echo "MAKEOPTS=\"-j$(nproc)\""
        } >> /etc/portage/make.conf
        getuto
        install -dm775 -o root -g portage /var/cache/distfiles

    - name: install tooling
      run: |
        # pkgdev/pkgcheck live in dev-util/ (moved from app-portage/); portage-utils
        # provides qlist. Autounmask so ~amd64-only tools are accepted.
        emerge --quiet --getbinpkg --autounmask=y --autounmask-write=y --autounmask-continue=y \
          dev-lang/ruby dev-util/pkgdev dev-util/pkgcheck \
          app-portage/portage-utils net-misc/curl dev-vcs/git

    - name: checkout
      uses: actions/checkout@v4

    - name: hermetic e2e (real emerge of a fixture package)
      run: bash test/e2e.sh
